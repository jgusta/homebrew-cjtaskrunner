name: Test Homebrew Formula

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v6

      - name: Install formula from source
        run: brew install --build-from-source ./Formula/cj.rb

      - name: Test formula
        run: brew test ./Formula/cj.rb
